apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: serving-platforms
  namespace: argocd
spec:
  description: KServe serving platforms
  destinations:
    - namespace: mlops-serving
      server: https://kubernetes.default.svc
  sourceRepos:
    - https://github.com/kevinmeix1/kserve-model-serving-platform.git
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kserve-model-serving-platform
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: serving-platforms
  source:
    repoURL: https://github.com/kevinmeix1/kserve-model-serving-platform.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: mlops-serving
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 3
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
      - PruneLast=true
---
apiVersion: batch/v1
kind: Job
metadata:
  name: serving-pre-sync-gates
  namespace: mlops-serving
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/sync-wave: "-1"
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: serving-gates
          image: python:3.12-slim
          command: ["python", "-c", "print('validate payload contracts, policy audit, and route topology before sync')"]
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: credit-risk-canary-analysis
  namespace: mlops-serving
spec:
  metrics:
    - name: p95-latency
      interval: 1m
      count: 5
      successCondition: result[0] < 60
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: histogram_quantile(0.95, sum(rate(kserve_request_duration_seconds_bucket{service="credit-risk"}[5m])) by (le))
    - name: error-rate
      interval: 1m
      count: 5
      successCondition: result[0] < 0.005
      failureLimit: 1
      provider:
        prometheus:
          address: http://prometheus.monitoring.svc.cluster.local:9090
          query: sum(rate(kserve_request_total{service="credit-risk",code=~"5.."}[5m])) / sum(rate(kserve_request_total{service="credit-risk"}[5m]))
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: credit-risk-router
  namespace: mlops-serving
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 4
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: credit-risk-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: credit-risk-router
    spec:
      containers:
        - name: router
          image: ghcr.io/kevinmeix1/credit-risk-router:2026.07.0
          ports:
            - containerPort: 8080
  strategy:
    canary:
      steps:
        - setWeight: 5
        - pause:
            duration: 3m
        - analysis:
            templates:
              - templateName: credit-risk-canary-analysis
        - setWeight: 25
        - pause:
            duration: 5m
        - setWeight: 100
