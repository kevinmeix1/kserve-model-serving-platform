apiVersion: v1
kind: Namespace
metadata:
  name: mlops-serving
  labels:
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: credit-risk-predictor
  namespace: mlops-serving
automountServiceAccountToken: false
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: credit-risk-serving-ingress
  namespace: mlops-serving
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kserve-model-serving-platform
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: knative-serving
  egress:
    - to:
        - namespaceSelector: {}
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: credit-risk-serving
  namespace: mlops-serving
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kserve-model-serving-platform
