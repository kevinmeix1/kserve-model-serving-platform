apiVersion: serving.kserve.io/v1beta1
kind: InferenceService
metadata:
  name: credit-risk-router
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: kserve-model-serving-platform
    app.kubernetes.io/component: custom-predictor
    app.kubernetes.io/version: "0.2.1"
    mlops.dev/model: credit-risk
  annotations:
    serving.kserve.io/deploymentMode: Standard
    serving.kserve.io/autoscaler-class: none
    serving.kserve.io/enable-prometheus-scraping: "true"
    prometheus.kserve.io/path: /metrics
    prometheus.kserve.io/port: "8080"
    mlops.dev/scaling-blocker: shared-idempotency-store-required
spec:
  predictor:
    minReplicas: 1
    maxReplicas: 1
    containerConcurrency: 32
    timeout: 1
    serviceAccountName: credit-risk-predictor
    automountServiceAccountToken: false
    terminationGracePeriodSeconds: 30
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
      fsGroupChangePolicy: OnRootMismatch
      seccompProfile:
        type: RuntimeDefault
    containers:
      - name: kserve-container
        image: ghcr.io/kevinmeix1/kserve-model-serving-platform:replace-with-git-sha
        imagePullPolicy: IfNotPresent
        env:
          - name: SERVING_STATE_ROOT
            value: /var/lib/kserve-platform
          - name: SERVING_MODEL_NAME
            value: credit-risk-router
          - name: SERVING_BOOTSTRAP_STATE
            value: "true"
          - name: INFERENCE_MAX_CONCURRENCY
            value: "32"
          - name: INFERENCE_MAX_BATCH_SIZE
            value: "128"
          - name: INFERENCE_MAX_REQUEST_BYTES
            value: "262144"
          - name: INFERENCE_TIMEOUT_SECONDS
            value: "0.25"
          - name: INFERENCE_QUEUE_TIMEOUT_SECONDS
            value: "0.05"
          - name: INFERENCE_SHUTDOWN_GRACE_SECONDS
            value: "5.0"
          - name: IDEMPOTENCY_CLAIM_TTL_SECONDS
            value: "30.0"
          - name: LOG_LEVEL
            value: INFO
        ports:
          - name: http
            containerPort: 8080
            protocol: TCP
        startupProbe:
          httpGet:
            path: /v2/health/live
            port: http
          periodSeconds: 2
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /v2/health/ready
            port: http
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /v2/health/live
            port: http
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 5
        resources:
          requests:
            cpu: 250m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 65532
          runAsGroup: 65532
          seccompProfile:
            type: RuntimeDefault
        volumeMounts:
          - name: runtime-state
            mountPath: /var/lib/kserve-platform
          - name: tmp
            mountPath: /tmp
    volumes:
      - name: runtime-state
        emptyDir:
          sizeLimit: 256Mi
      - name: tmp
        emptyDir:
          medium: Memory
          sizeLimit: 64Mi
