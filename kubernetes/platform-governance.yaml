apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: model-serving-critical
value: 100000
globalDefault: false
description: "Priority for model serving rollouts, rollback, and canary analysis."
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: model-serving-quota
  namespace: mlops-serving
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
    services: "20"
    count/jobs.batch: "20"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: model-serving-default-limits
  namespace: mlops-serving
spec:
  limits:
    - type: Container
      default:
        cpu: "1"
        memory: 1Gi
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      maxLimitRequestRatio:
        cpu: "4"
        memory: "4"
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: credit-risk-route
  namespace: mlops-serving
spec:
  parentRefs:
    - name: internal-ml-gateway
      namespace: platform-ingress
  hostnames:
    - credit-risk.internal.example.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v2/models/credit-risk
      backendRefs:
        - name: credit-risk-router
          port: 80
