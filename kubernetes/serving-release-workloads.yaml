apiVersion: v1
kind: ConfigMap
metadata:
  name: credit-risk-serving-policy
  namespace: mlops-serving
data:
  CANARY_STEPS: "1,5,10,25,50"
  LATENCY_P95_MS: "35"
  MAX_ERROR_RATE: "0.01"
  MAX_SHADOW_DELTA: "0.12"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: credit-risk-release-runner
  namespace: mlops-serving
rules:
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: [""]
    resources: ["pods", "pods/log", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: credit-risk-release-runner
  namespace: mlops-serving
subjects:
  - kind: ServiceAccount
    name: credit-risk-predictor
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: credit-risk-release-runner
---
apiVersion: batch/v1
kind: Job
metadata:
  name: credit-risk-canary-analysis
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: kserve-model-serving-platform
    app.kubernetes.io/component: release-analysis
    kueue.x-k8s.io/queue-name: credit-risk-serving-queue
    kueue.x-k8s.io/priority-class: serving-release-critical
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      serviceAccountName: credit-risk-predictor
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: canary-analysis
          image: ghcr.io/kevinmeix1/kserve-model-serving-platform:2026.07.0
          command: ["bash", "-lc"]
          args:
            - "make deploy && make simulate && make monitor"
          envFrom:
            - configMapRef:
                name: credit-risk-serving-policy
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: credit-risk-router-hpa
  namespace: mlops-serving
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: credit-risk-router-predictor
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
