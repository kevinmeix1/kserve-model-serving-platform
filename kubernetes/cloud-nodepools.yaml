apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: credit-risk-serving-on-demand
spec:
  template:
    metadata:
      labels:
        workload-tier: serving
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: serving-default
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
  limits:
    cpu: "96"
    memory: 384Gi
  disruption:
    consolidationPolicy: WhenEmptyOrUnderutilized
    consolidateAfter: 10m
---
apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: serving-default
spec:
  role: eks-auto-mode-node-role
  subnetSelectorTerms:
    - tags:
        kubernetes.io/role/internal-elb: "1"
  securityGroupSelectorTerms:
    - tags:
        app.kubernetes.io/part-of: kserve-model-serving-platform
  tags:
    cost-center: model-serving
    workload: low-latency-inference
