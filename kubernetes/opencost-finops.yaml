apiVersion: v1
kind: Namespace
metadata:
  name: opencost-exporter
  labels:
    app.kubernetes.io/name: opencost
    platform.mlops.dev/owner: platform-finops
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: opencost-prometheus-scrape
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: opencost-finops
    platform.mlops.dev/component: cost-observability
data:
  prometheus.yml: |
    scrape_configs:
      - job_name: opencost
        scrape_interval: 1m
        scrape_timeout: 10s
        metrics_path: /metrics
        scheme: http
        static_configs:
          - targets:
              - opencost.opencost-exporter:9003
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kserve-cost-allocation-contract
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: opencost-finops
    platform.mlops.dev/component: allocation-contract
data:
  required-labels: model,cost-center,traffic-class,environment,owner
  allocation-dimensions: namespace,inferenceservice,revision,httproute,label_model,label_cost_center,label_traffic_class
  cost-per-1000-predictions-query: |
    (
      sum(container_cpu_allocation * on(node) group_left node_cpu_hourly_cost) by (namespace, label_model, label_traffic_class) * 730
      + sum(container_memory_allocation_bytes * on(node) group_left node_ram_hourly_cost) by (namespace, label_model, label_traffic_class) * 730 / 1024 / 1024 / 1024
    )
    /
    clamp_min(sum(increase(istio_requests_total{destination_service_namespace="mlops-serving",response_code!~"5.."}[30d])) by (namespace, label_model, label_traffic_class), 1)
    * 1000
  gpu-serving-cost-query: |
    sum(node_gpu_hourly_cost) by (namespace, node, label_model, label_traffic_class) * 730
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kserve-cost-observability
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: opencost-finops
    platform.mlops.dev/component: budget-alerts
spec:
  groups:
    - name: kserve.finops.opencost
      rules:
        - alert: KServeCostPerThousandPredictionsHigh
          expr: |
            (
              sum(container_cpu_allocation * on(node) group_left node_cpu_hourly_cost) by (namespace) * 730
              + sum(container_memory_allocation_bytes * on(node) group_left node_ram_hourly_cost) by (namespace) * 730 / 1024 / 1024 / 1024
            )
            /
            clamp_min(sum(increase(istio_requests_total{destination_service_namespace="mlops-serving",response_code!~"5.."}[30d])) by (namespace), 1)
            * 1000 > 2.4
          for: 30m
          labels:
            severity: warning
            team: ml-serving
          annotations:
            summary: KServe serving unit cost is above the cost-per-1000-predictions budget.
            runbook_url: docs/cost-observability.md
        - alert: KServeShadowModelBudgetExceeded
          expr: |
            sum(container_cpu_allocation{label_traffic_class="shadow"} * on(node) group_left node_cpu_hourly_cost) by (namespace) * 730 > 420
          for: 20m
          labels:
            severity: warning
            team: ml-serving
          annotations:
            summary: Shadow scoring cost is above the planned serving budget.
            runbook_url: docs/cost-observability.md
        - alert: KServeIdleGpuServingSpend
          expr: |
            sum(node_gpu_hourly_cost) by (namespace) > 0
            unless sum(DCGM_FI_DEV_GPU_UTIL{namespace="mlops-serving"}) by (namespace) > 0
          for: 15m
          labels:
            severity: warning
            team: ml-serving
          annotations:
            summary: GPU serving spend is present without matching accelerator utilization.
            runbook_url: docs/cost-observability.md
        - alert: KServeCostAllocationLabelMissing
          expr: |
            count by (namespace) (
              kube_pod_info{namespace="mlops-serving"}
              unless on(namespace, pod) kube_pod_labels{namespace="mlops-serving", label_cost_center!=""}
            ) > 0
          for: 10m
          labels:
            severity: page
            team: platform-finops
          annotations:
            summary: KServe workload is missing cost allocation labels.
            runbook_url: docs/cost-observability.md
