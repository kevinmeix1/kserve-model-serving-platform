apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: serving-debugger-impersonate-identity
  namespace: mlops-serving
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["serviceaccounts"]
    resourceNames: ["router-reader"]
    verbs: ["impersonate:serviceaccount"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollback-controller-impersonate-identity
  namespace: mlops-serving
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["serviceaccounts"]
    resourceNames: ["serving-status-writer"]
    verbs: ["impersonate:serviceaccount"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rollback-controller-impersonate-actions
  namespace: mlops-serving
rules:
  - apiGroups: ["serving.kserve.io"]
    resources: ["inferenceservices/status"]
    verbs:
      - "impersonate-on:serviceaccount:get"
      - "impersonate-on:serviceaccount:patch"
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes/status"]
    verbs:
      - "impersonate-on:serviceaccount:get"
      - "impersonate-on:serviceaccount:patch"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollback-controller-impersonate-identity
  namespace: mlops-serving
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rollback-controller-impersonate-identity
subjects:
  - kind: ServiceAccount
    name: rollback-controller
    namespace: mlops-serving
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rollback-controller-impersonate-actions
  namespace: mlops-serving
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: rollback-controller-impersonate-actions
subjects:
  - kind: ServiceAccount
    name: rollback-controller
    namespace: mlops-serving
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: serving-debugger-impersonate-actions
  namespace: mlops-serving
rules:
  - apiGroups: ["serving.kserve.io"]
