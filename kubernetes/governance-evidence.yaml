apiVersion: v1
kind: ConfigMap
metadata:
  name: credit-risk-serving-governance-policy
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: governance-evidence
    app.kubernetes.io/part-of: kserve-model-serving-platform
data:
  required_evidence: |
    - model-card
    - data-card
    - risk-register
    - approval-record
    - reproducibility-manifest
  promotion_policy: |
    canary promotion requires latency, error-rate, shadow-delta, live-traffic, rollback, and request-contract evidence
---
apiVersion: batch/v1
kind: Job
metadata:
  name: credit-risk-serving-evidence-bundle
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: governance-evidence
spec:
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: governance-evidence
    spec:
      restartPolicy: Never
      serviceAccountName: kserve-release
      containers:
        - name: evidence
          image: ghcr.io/kevinmeix1/kserve-model-serving-platform@sha256:replace-with-built-image-digest
          command: ["python", "-m", "kserve_model_platform", "governance-bundle", "--output", "/workspace"]
          env:
            - name: REQUIRED_EVIDENCE
              value: "model-card,data-card,risk-register,approval-record,reproducibility-manifest"
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: credit-risk-serving-weekly-governance-review
  namespace: mlops-serving
  labels:
    app.kubernetes.io/name: governance-evidence
spec:
  schedule: "0 10 * * 1"
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: review
              image: ghcr.io/kevinmeix1/kserve-model-serving-platform@sha256:replace-with-built-image-digest
              command: ["python", "-m", "kserve_model_platform", "governance-bundle", "--output", "/workspace"]
              resources:
                requests:
                  cpu: "250m"
                  memory: "256Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: true
                runAsNonRoot: true
