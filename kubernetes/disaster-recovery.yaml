apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: serving-backup-location
  namespace: velero
spec:
  provider: aws
  objectStorage:
    bucket: mlops-platform-backups
    prefix: kserve-model-serving-platform
  config:
    region: us-east-1
---
apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: serving-namespace-15m
  namespace: velero
spec:
  schedule: "*/15 * * * *"
  template:
    includedNamespaces:
      - mlops-serving
    snapshotVolumes: true
    ttl: 168h0m0s
    storageLocation: serving-backup-location
---
apiVersion: snapshot.storage.k8s.io/v1
kind: VolumeSnapshotClass
metadata:
  name: serving-retain-snapshots
driver: csi.example.com
deletionPolicy: Retain
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: registry-alias-backup
  namespace: mlops-serving
spec:
  schedule: "*/15 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: export-registry
              image: python:3.12-slim
              command: ["python", "-c", "print('export registry aliases, idempotency keys, and prediction log offsets')"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: restore-order
  namespace: mlops-serving
data:
  restore-order.yaml: |
    - namespace-and-serving-crds
    - network-and-gateway-routes
    - registry-aliases-and-model-artifacts
    - idempotency-cache
    - kserve-runtime
